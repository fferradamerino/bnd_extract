name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.20'

    - name: Build
      run: GOOS=windows GOARCH=amd64 go build bnd_extract.go

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: bnd_extract.exe
